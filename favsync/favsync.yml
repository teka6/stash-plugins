name: FavSync
description: >
  Bi-directional performer favorites sync across Stash, StashDB, and Whisparr.
  On favorite toggle in Stash, pushes to StashDB (favoritePerformer mutation)
  and sets Whisparr performer monitored flag to match.
  Tasks for one-shot reconcile and dry-run reporting.
version: 0.1.1
url: https://github.com/teka6/stash-plugins
ui:
  requires: []

exec:
  - python3
  - "{pluginDir}/favsync.py"
interface: raw
errLog: warning

hooks:
  - name: Sync on performer favorite toggle
    description: Runs on every Performer.Update.Post; no-op if favorite state matches remote.
    triggeredBy:
      - Performer.Update.Post

tasks:
  - name: Sync All Favorites
    description: Union reconcile — ensures every favorite in Stash/StashDB is favorited in both, and matching Whisparr performer is monitored.
    defaultArgs:
      mode: sync-all
  - name: Report Diffs (dry-run)
    description: Reports mismatches across Stash, StashDB, and Whisparr without making any changes.
    defaultArgs:
      mode: report
  - name: Monitor All Favs in Whisparr (bulk)
    description: For every current favorite (Stash ∪ StashDB), sets matching Whisparr performer to monitored=True.
    defaultArgs:
      mode: monitor-whisparr

settings:
  stashdb_api_key:
    displayName: StashDB API Key
    description: API key for stashdb.org (used for favoritePerformer mutation + queryPerformers)
    type: STRING
  whisparr_url:
    displayName: Whisparr URL
    description: e.g. https://whisparr.example.com (no trailing slash needed)
    type: STRING
  whisparr_api_key:
    displayName: Whisparr API Key
    type: STRING
  dry_run:
    displayName: Dry-Run Mode
    description: When enabled, log what would change but make no writes.
    type: BOOLEAN
