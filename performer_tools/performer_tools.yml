name: Performer Tools
description: Sync favorites across Stash/StashDB/Whisparr, enrich performer metadata from StashDB.
version: 1.1.0
url: https://github.com/thenik/stash-performer-tools
interface: raw
exec:
  - python3
  - "{pluginDir}/performer_tools.py"

ui:
  requires:
    - stashUserscriptLibrary7dJx1qP
  javascript:
    - performer_tools_ui.js

settings:
  dryRun:
    type: BOOLEAN
    displayName: Dry Run
    description: "Preview changes without applying them (default: on)"
  stashdbApiKey:
    type: STRING
    displayName: StashDB API Key
    description: "StashDB API key (same one configured in Stash's stash box settings)"
  sceneCountPerformers:
    type: BOOLEAN
    displayName: Show scene count on performer pages
    description: "Display local/stashbox scene count badge next to StashDB IDs on performer pages"
  sceneCountStudios:
    type: BOOLEAN
    displayName: Show scene count on studio pages
    description: "Display local/stashbox scene count badge next to StashDB IDs on studio pages"
  includeSubsidiaryStudios:
    type: BOOLEAN
    displayName: Include subsidiary studios in studio scene count
    description: "When counting studio scenes, include scenes from child studios"
  whisparrUrl:
    type: STRING
    displayName: Whisparr URL
    description: "Whisparr base URL (e.g. https://whisparrv3.thenik.org)"
  whisparrApiKey:
    type: STRING
    displayName: Whisparr API Key
    description: "Whisparr API key for import list management"
  whisparrRootFolder:
    type: STRING
    displayName: Whisparr Root Folder
    description: "Root folder path for Whisparr import lists (e.g. /mnt/unionfs/Adult/_AA Sites Scenes)"
  whisparrQualityProfile:
    type: NUMBER
    displayName: Whisparr Quality Profile ID
    description: "Quality profile ID for Whisparr import lists (default: 8)"
  rateLimitSeconds:
    type: NUMBER
    displayName: Rate Limit (seconds)
    description: "Delay between StashDB API calls (default: 2)"

tasks:
  - name: Performer Status
    description: Show performer counts across Stash, StashDB, and Whisparr
    defaultArgs:
      mode: status

  - name: Sync Favorites
    description: Sync favorites bidirectionally between Stash, StashDB, and Whisparr
    defaultArgs:
      mode: sync

  - name: Sync StashDB Only
    description: Sync favorites between Stash and StashDB only
    defaultArgs:
      mode: sync
      stashdbOnly: "true"

  - name: Enrich Performers
    description: Fill missing performer metadata from StashDB (gap-fill only, never overwrites)
    defaultArgs:
      mode: enrich

  - name: Enrich All Favorites
    description: Enrich all favorite performers, even those already linked
    defaultArgs:
      mode: enrich
      allPerformers: "true"

  - name: Get Stashbox Performer Scene Count
    description: Gets stashbox performer scene count (called by UI)
    defaultArgs:
      mode: stashbox_performer_scene_count
      endpoint: null
      api_key: null
      stash_id: null

  - name: Get Stashbox Studio Scene Count
    description: Gets stashbox studio scene count (called by UI)
    defaultArgs:
      mode: stashbox_studio_scene_count
      endpoint: null
      api_key: null
      stash_id: null
